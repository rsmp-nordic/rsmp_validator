# This workflow runs the internal sus tests
# 
name: Sus
on: [push]
jobs:
  test:
    timeout-minutes: 1
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: ruby/setup-ruby@v1
      with:
        bundler-cache: true
    - run: bundle exec sus

